# video feedback preset
# saved: 2026-04-21 11:13:25
# notes: (edit this line to describe the preset; trade with friends)

[layers]
warp     = on
optics   = on
gamma    = off
color    = on
contrast = on
decay    = on
noise    = on
couple   = on
external = on
inject   = on
physics  = off
thermal  = on

[quality]
# blur:     0=5-tap cross   1=9-tap gauss   2=25-tap gauss
# ca:       0=3-sample      1=5-sample ramp 2=8-sample wavelen
# noise:    0=white  1=pink 1/f  2=heavy static  3=VCR  4=dropout
# fields:   1..4 coupled feedback fields
# pixelate: 0=off  1..3=dots s/m/l  4..6=squares s/m/l  7..9=rounded s/m/l
# pixelateBleed: 0=off  1=soft  2=CRT  3=melt  4=fried
blur          = 2
ca            = 2
noise         = 3
fields        = 4
pixelate      = 0
pixelateBleed = 1
pixelateBurnSeed = 0

[warp]
zoom     = 0.993599
theta    = 0.020000
pivotX   = 0.500000
pivotY   = 0.500000
transX   = 0.000000
transY   = 0.000000

[optics]
chroma     = 0.002000
blurX      = 1.000000
blurY      = 1.000000
blurAngle  = 0.000000

[color]
gamma    = 2.200000
hueRate  = 0.020800
satGain  = 1.651998
contrast = 1.002000

[dynamics]
decay    = 0.996000
noise    = 0.002000
couple   = 0.170000
external = 0.200000

[trigger]
# pattern: 0=H-bars 1=V-bars 2=dot 3=checker 4=gradient
#          5=noise 6=rings 7=spiral 8=polka 9=starburst 10=bouncer
pattern  = 1

[physics]
# Crutchfield 1984 camera-side knobs (see shaders/layers/physics.glsl).
# invert: 0 or 1 — Crutchfield's s parameter; inverts all channels.
# invertPeriod: apply the invert every Nth frame. 1=legacy strobe, 20≈3Hz, 60≈1Hz.
# sensorGamma: photoconductor response curve, 1.0 = no-op; paper says 0.6..0.9.
# satKnee: 0 = hard clip; 1 = full Reinhard rolloff.
# colorCross: 0 = RGB independent; 1 = all channels become mean.
invert       = 0
invertPeriod = 20
sensorGamma  = 1.000000
satKnee      = 0.005000
colorCross   = 0.000000

[thermal]
# Air turbulence between camera and monitor — noise-driven UV displacement.
# amp: 0=off, 0.01=barely shimmer, 0.05=heat, 0.15+=turbulent.
# scale: noise spatial frequency (1=wide rolls, 20+=dense).
# speed: time evolution rate. rise: upward bias (heat). swirl: vorticity.
amp    = 0.015000
scale  = 4.000000
speed  = 2.000000
rise   = 0.060000
swirl  = 1.000001

[vfx]
# V-4-inspired effect slots. slot1/slot2 are effect IDs (0=off, 1..18).
# See main.cpp::VFX_NAMES for the full list. param1/param2 are the
# CONTROL-dial equivalents (0..1). bsource1/bsource2: 0=camera, 1=self.
slot1    = 0
param1   = 0.500000
bsource1 = 0
slot2    = 0
param2   = 0.500000
bsource2 = 0

[output]
# Output fade: bipolar, -1=black, 0=through, +1=white.
# Brightness: display-only multiplier (not in feedback loop). 1=identity.
fade       = 0.000000
brightness = 1.000000

[bpm]
# Tempo + 5 beat-locked modulations. divIdx: 0=x2, 1=x1, 2=÷2, 3=÷4.
bpm      = 120.000
divIdx   = 1
sync     = on
inject   = off
strobe   = on
vfxCycle = off
flash    = off
decayDip = off
hueJump  = on
hueJumpStep = 12.000000
invert   = off
invertDiv = 4
