# video feedback preset
# saved: starter pack
# notes: kaneko CML — 4 coupled feedback fields each reading from its
#        ring neighbour, mirrored theta and hue per field. Produces
#        cross-field interference patterns unreachable with single loops.
#        Higher GPU load. Try seeding with checker (4) or gradient (5).

[layers]
warp     = on
optics   = on
gamma    = off
color    = on
contrast = on
decay    = on
noise    = on
couple   = on
external = off
inject   = on

[quality]
blur     = 1
ca       = 1
noise    = 1
fields   = 4

[warp]
zoom     = 1.008000
theta    = 0.012000
pivotX   = 0.500000
pivotY   = 0.500000
transX   = 0.000000
transY   = 0.000000

[optics]
chroma     = 0.002500
blurX      = 1.000000
blurY      = 1.000000
blurAngle  = 0.000000

[color]
gamma    = 2.200000
hueRate  = 0.005000
satGain  = 1.020000
contrast = 1.025000

[dynamics]
decay    = 0.997000
noise    = 0.002000
couple   = 0.180000
external = 0.000000

[trigger]
pattern  = 3
