# video feedback preset
# saved: starter pack
# notes: long cascade — very slow decay, fine zoom, low noise.
#        Best with --precision 32. Inject horizontal bars (1) and walk away;
#        most runs trail off in 5-15 minutes, occasionally one will live for an hour.

[layers]
warp     = on
optics   = on
gamma    = off
color    = on
contrast = on
decay    = on
noise    = on
couple   = off
external = off
inject   = on

[quality]
blur     = 2
ca       = 1
noise    = 1
fields   = 2

[warp]
zoom     = 1.005000
theta    = 0.004000
pivotX   = 0.500000
pivotY   = 0.500000
transX   = 0.000000
transY   = 0.000000

[optics]
chroma     = 0.001500
blurX      = 0.900000
blurY      = 0.900000
blurAngle  = 0.000000

[color]
gamma    = 2.200000
hueRate  = 0.001000
satGain  = 1.005000
contrast = 1.040000

[dynamics]
decay    = 0.999300
noise    = 0.000800
couple   = 0.000000
external = 0.000000

[trigger]
pattern  = 0
