# video feedback preset
# saved: starter pack
# notes: turing blobs — gentle inward zoom + sharp contrast + small blur.
#        Pattern is checker (4); inject and watch reaction-diffusion-like
#        breathing structures emerge over 30-90 seconds.

[layers]
warp     = on
optics   = on
gamma    = off
color    = on
contrast = on
decay    = on
noise    = on
couple   = off
external = off
inject   = on

[quality]
blur     = 1
ca       = 0
noise    = 1
fields   = 2

[warp]
zoom     = 0.998000
theta    = 0.000000
pivotX   = 0.500000
pivotY   = 0.500000
transX   = 0.000000
transY   = 0.000000

[optics]
chroma     = 0.000000
blurX      = 0.700000
blurY      = 0.700000
blurAngle  = 0.000000

[color]
gamma    = 2.200000
hueRate  = 0.001500
satGain  = 1.030000
contrast = 1.080000

[dynamics]
decay    = 0.996000
noise    = 0.003000
couple   = 0.000000
external = 0.000000

[trigger]
pattern  = 3
