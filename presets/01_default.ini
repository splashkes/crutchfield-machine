# video feedback preset
# saved: starter pack
# notes: defaults — gentle slow rotation with rainbow drift, dot pattern injection

[layers]
warp     = on
optics   = on
gamma    = off
color    = on
contrast = on
decay    = on
noise    = on
couple   = off
external = off
inject   = on

[quality]
# blur:  0=5-tap cross   1=9-tap gauss   2=25-tap gauss
# ca:    0=3-sample      1=5-sample ramp 2=8-sample wavelen
# noise: 0=white          1=pink 1/f
blur     = 1
ca       = 1
noise    = 1
fields   = 2

[warp]
zoom     = 1.010000
theta    = 0.010000
pivotX   = 0.500000
pivotY   = 0.500000
transX   = 0.000000
transY   = 0.000000

[optics]
chroma     = 0.002000
blurX      = 1.000000
blurY      = 1.000000
blurAngle  = 0.000000

[color]
gamma    = 2.200000
hueRate  = 0.003000
satGain  = 1.010000
contrast = 1.020000

[dynamics]
decay    = 0.995000
noise    = 0.002000
couple   = 0.050000
external = 0.200000

[trigger]
pattern  = 2
