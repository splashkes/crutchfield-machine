# video feedback preset
# saved: starter pack
# notes: rainbow spiral — slow rotation + outward zoom + steady hue drift.
#        After loading, hit space briefly with a dot pattern (3) to seed.

[layers]
warp     = on
optics   = on
gamma    = off
color    = on
contrast = on
decay    = on
noise    = on
couple   = off
external = off
inject   = on

[quality]
blur     = 1
ca       = 1
noise    = 1
fields   = 2

[warp]
zoom     = 1.012000
theta    = 0.020000
pivotX   = 0.500000
pivotY   = 0.500000
transX   = 0.000000
transY   = 0.000000

[optics]
chroma     = 0.003000
blurX      = 1.200000
blurY      = 1.200000
blurAngle  = 0.000000

[color]
gamma    = 2.200000
hueRate  = 0.008000
satGain  = 1.020000
contrast = 1.030000

[dynamics]
decay    = 0.998000
noise    = 0.001500
couple   = 0.000000
external = 0.000000

[trigger]
pattern  = 2
